<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TURNIAZ - Login</title>
<link rel="stylesheet" href="/style.css">
<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.login-card{
width:420px;
background:#ffffff;
border-radius:22px;
padding:40px 30px 30px 30px;
box-shadow:0 25px 60px rgba(0,0,0,0.35);
text-align:center;
position:relative;
}

.ita-logo{
position:absolute;
top:-70px;
left:50%;
transform:translateX(-50%);
width:220px;
}

.login-card h2{
margin-top:80px;
margin-bottom:25px;
font-size:32px;
color:#111;
}

.input-group{
margin-bottom:18px;
text-align:left;
}

.input-group label{
display:block;
font-size:14px;
margin-bottom:6px;
font-weight:bold;
}

.input-group input{
width:100%;
height:48px;
padding:0 12px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

.login-btn{
width:100%;
height:50px;
border:none;
border-radius:12px;
background:#111;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.login-btn:hover{
opacity:0.9;
}

.errore{
color:#c62828;
margin-top:14px;
min-height:20px;
font-size:14px;
}
</style>
</head>

<body>

<div class="login-card">

<img src="/img/ita-logo.png" class="ita-logo">

<h2>Benvenuta/o</h2>

<form id="loginForm">

<div class="input-group">
<label>Username</label>
<input type="text" id="username" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<button type="submit" class="login-btn">Accedi</button>

</form>

<p id="errore" class="errore"></p>

</div>

<script>
const form = document.getElementById("loginForm");
const errore = document.getElementById("errore");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

try{

const response = await fetch("/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username,password})
});

const data = await response.json();

if(data.success){
localStorage.setItem("utenteLoggato",data.nome);
window.location.href="/dashboard.html";
}else{
errore.textContent=data.message;
}

}catch(err){
errore.textContent="Errore di connessione al server";
}

});
</script>

</body>
</html>
